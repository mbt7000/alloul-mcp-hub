name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/alloul-mcp-hub
            git pull origin main
            docker compose up -d --build
            docker exec alloul-mcp-hub-ollama-1 ollama pull qwen2.5-coder:32b || true
            docker exec alloul-mcp-hub-ollama-1 ollama pull llama3.3:70b || true
